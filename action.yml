name: 'Qbric Action'
description: 'Qbric unified action — test-generation (pipeline) and repo scanner in one step'

inputs:
  # ── Test-generator inputs (pipeline mode) ────────────────────────────────
  mode:
    description: 'Operation mode. "auto" detects the best strategy automatically.'
    required: false
    default: ''
  framework:
    description: 'Test framework hint. "auto-detect" lets Qbric choose.'
    required: false
    default: 'auto-detect'
  dry-run:
    description: 'When "true" the generator analyses the repo but writes no files.'
    required: false
    default: 'false'
  pipeline:
    description: 'Enable Qbric pipeline (AI test generation). Set to "true" to activate.'
    required: false
    default: 'false'

  # ── Scanner inputs ─────────────────────────────────────────────────────────
  scan-path:
    description: 'Path to scan'
    required: false
    default: '.'
  tenant-id:
    description: 'Qbric tenant id (numeric)'
    required: false
    default: ''
  qbric-api-url:
    description: 'Base URL of qbric-api, e.g. https://qbric-api. Reporting is skipped when empty.'
    required: false
    default: ''
  qbric-scan-token:
    description: 'Bearer token for the scan-results ingestion endpoint (provide via a GitHub secret).'
    required: false
    default: ''
  enable-java:
    description: 'Include Java/Maven/Gradle heuristics'
    required: false
    default: 'true'
  enable-node:
    description: 'Include Node/npm heuristics'
    required: false
    default: 'true'
  enable-secrets:
    description: 'Fail the build when a likely secret is found'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    # ── Step 1: Test Generator (only when pipeline=true) ───────────────────
    - name: Run Qbric Test Generator
      if: ${{ inputs.pipeline == 'true' }}
      shell: bash
      env:
        QBRIC_MODE: ${{ inputs.mode }}
        QBRIC_FRAMEWORK: ${{ inputs.framework }}
        QBRIC_DRY_RUN: ${{ inputs.dry-run }}
        REPO_FULL_NAME: ${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/test-generator.sh"
        "${{ github.action_path }}/scripts/test-generator.sh" "${{ inputs.scan-path }}"

    # ── Step 2: Scanner (always runs unless scan inputs are all empty) ────────
    - name: Run Qbric Scan
      shell: bash
      env:
        QBRIC_API_URL: ${{ inputs.qbric-api-url }}
        QBRIC_SCAN_TOKEN: ${{ inputs.qbric-scan-token }}
        QBRIC_TENANT_ID: ${{ inputs.tenant-id }}
        ENABLE_JAVA: ${{ inputs.enable-java }}
        ENABLE_NODE: ${{ inputs.enable-node }}
        ENABLE_SECRETS: ${{ inputs.enable-secrets }}
        REPO_FULL_NAME: ${{ github.repository }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_ID: ${{ github.run_id }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/scan.sh"
        "${{ github.action_path }}/scripts/scan.sh" "${{ inputs.scan-path }}"
